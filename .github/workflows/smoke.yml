name: Smoke validation

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Configure credentials
        uses: tracebit-com/tracebit-community-action@d0a68cb29196eafce908de76ec596a7e9ca049da
        with:
          api-token: ${{ secrets.SECURITY_API_TOKEN }}
          profile: admin
          profile-region: us-east-1
          async: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight CI dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas numba pytest
          echo "Skipping heavyweight/specialized simulation dependencies in CI smoke test."
          echo "OpenMC and full physics validation should run in a dedicated supported environment."

      - name: Compile project Python files
        run: |
          python -m compileall .

      - name: Check importability of local Python files
        run: |
          python - <<'PY'
          import ast
          from pathlib import Path

          failures = []
          for path in Path('.').rglob('*.py'):
              if any(part in {'.git', '.venv', 'venv', '__pycache__'} for part in path.parts):
                  continue
              try:
                  ast.parse(path.read_text(encoding='utf-8'))
              except Exception as exc:
                  failures.append((str(path), repr(exc)))

          if failures:
              for path, exc in failures:
                  print(f'{path}: {exc}')
              raise SystemExit(1)

          print('All project Python files parsed successfully.')
          PY

      - name: Report optimizer presence
        run: |
          if [ -f run_reactor_optimizer.py ]; then
            echo "run_reactor_optimizer.py found. Full optimizer execution is intentionally skipped in CI smoke validation."
            echo "Reason: full optimization / OpenMC-style validation may require heavyweight external dependencies and long runtimes."
          else
            echo "No run_reactor_optimizer.py found; skipping optimizer report."
          fi
